name: Qbus MQTT Gateway
description: Publishes Qbus states and events to MQTT
version: 0.6.0-b1
image: thomasddn/home-assistant-addon-beta-qbusmqtt-{arch}
slug: qbusmqtt
init: false
codenotary: 11554546+thomasddn@users.noreply.github.com
host_network: true
arch:
  - aarch64
  - amd64
map:
  - type: addon_config
    read_only: false
services:
  - 'mqtt:need'
schema:
  MQTT_HOST: str?
  MQTT_PORT: port?
  MQTT_USER: str?
  MQTT_PWD: str?
